{% extends "base.html" %}

{% block title %}Chat - Kiselgram{% endblock %}

{% block styles %}
<style>
    /* Direct chat is now handled by the two-column layout */
    .redirect-message {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        gap: 20px;
        text-align: center;
        padding: 20px;
    }

    .redirect-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid var(--border-color);
        border-top-color: var(--accent-blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
{% endblock %}

{% block left_panel %}{% endblock %}
{% block right_panel %}{% endblock %}

{% block scripts %}
<script>
    // Redirect to the two-column chat interface
    window.location.href = '/chat_list';
</script>
{% endblock %}
