<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kiselgram Ultra · Premium</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0B1120">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- Premium fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Original CSS files -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/desktop.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chats.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">

    <style>
        /* ===== PREMIUM DESIGN SYSTEM & FIXES ===== */
        :root {
            --bg-primary: #f5f7fc;
            --bg-secondary: #ffffff;
            --bg-surface: #fafcff;
            --sidebar-bg: rgba(255,255,255,0.85);
            --border-light: rgba(0,0,0,0.04);
            --border-medium: rgba(0,0,0,0.08);
            --text-primary: #0b1120;
            --text-secondary: #3a4a5c;
            --text-muted: #6b7a8a;
            --accent-blue: #2563eb;
            --accent-green: #10b981;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass-bg: rgba(255,255,255,0.75);
            --shadow-sm: 0 8px 20px -6px rgba(0,0,0,0.05);
            --shadow-md: 0 20px 30px -10px rgba(0,0,0,0.08);
            --shadow-lg: 0 30px 40px -15px rgba(0,0,0,0.12);
            --radius-card: 24px;
            --radius-element: 18px;
            --font-sans: 'Plus Jakarta Sans', 'Inter', -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg-primary: #070b14;
            --bg-secondary: #111927;
            --bg-surface: #0f1622;
            --sidebar-bg: rgba(17,25,39,0.9);
            --border-light: rgba(255,255,255,0.04);
            --border-medium: rgba(255,255,255,0.08);
            --text-primary: #edf2f7;
            --text-secondary: #a0b3cc;
            --text-muted: #6a7f9e;
            --glass-bg: rgba(17,25,39,0.8);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Premium badge (clean) */
        .premium-badge {
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%) !important;
            color: white !important;
            padding: 3px 10px !important;
            border-radius: 40px !important;
            font-size: 10px !important;
            font-weight: 700 !important;
            letter-spacing: 0.3px !important;
            text-transform: uppercase !important;
            margin-left: 8px !important;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3) !important;
            border: none !important;
            display: inline-block !important;
            vertical-align: middle !important;
        }

        /* Stories row: horizontal scroll, no overlap */
        .stories-row {
            display: flex !important;
            flex-direction: row !important;
            gap: 16px !important;
            padding: 16px !important;
            overflow-x: auto !important;
            overflow-y: visible !important;
            scrollbar-width: none !important;
            white-space: nowrap !important;
            flex-wrap: nowrap !important;
        }
        .stories-row::-webkit-scrollbar { display: none !important; }
        .story-item {
            display: inline-flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 6px !important;
            cursor: pointer !important;
            flex-shrink: 0 !important;
            transition: transform 0.2s !important;
            width: auto !important;
        }
        .story-avatar {
            width: 68px !important;
            height: 68px !important;
            padding: 3px !important;
            background: linear-gradient(45deg, #f97316, #ec4899, #8b5cf6, #06b6d4) !important;
            border-radius: 50% !important;
            box-shadow: var(--shadow-md) !important;
        }
        .story-avatar-placeholder {
            width: 100% !important;
            height: 100% !important;
            border-radius: 50% !important;
            border: 3px solid var(--bg-secondary) !important;
        }

        /* ----- CREATE STORY MODAL FIXES ----- */
        .story-create-modal .modal-body {
            padding: 20px !important;
        }
        .story-media-upload {
            aspect-ratio: 9 / 16 !important;
            background: var(--bg-surface) !important;
            border: 2px dashed var(--border-medium) !important;
            border-radius: var(--radius-element) !important;
            cursor: pointer !important;
            overflow: hidden !important;
            margin-bottom: 16px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        .upload-placeholder {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            color: var(--text-muted) !important;
            width: 100% !important;
            height: 100% !important;
            text-align: center !important;
        }
        .upload-placeholder span {
            font-size: 48px !important;
            margin-bottom: 8px !important;
        }
        #storyMediaPreview {
            width: 100% !important;
            height: 100% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        #storyMediaPreview img,
        #storyMediaPreview video {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            background: #000 !important;
        }

        /* ----- STORY VIEWER REDESIGN: iPhone‑style modal, NOT fullscreen ----- */
        .story-viewer {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            background: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            z-index: 3000 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 20px !important;
        }
        /* The modal card itself */
        .story-viewer-modal {
            max-width: 380px !important;
            width: 100% !important;
            background: var(--bg-secondary) !important;
            border-radius: 36px !important;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3) !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
            border: 1px solid var(--border-light) !important;
        }
        /* Header inside modal */
        .story-viewer-header {
            padding: 16px 18px !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            border-bottom: 1px solid var(--border-light) !important;
            background: var(--bg-surface) !important;
        }
        .story-viewer-user {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            flex: 1 !important;
        }
        .story-viewer-avatar {
            width: 44px !important;
            height: 44px !important;
            border-radius: 50% !important;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: white !important;
            font-weight: 700 !important;
        }
        .story-viewer-info {
            display: flex !important;
            flex-direction: column !important;
        }
        .story-viewer-name {
            font-weight: 700 !important;
            color: var(--text-primary) !important;
        }
        .story-viewer-time {
            font-size: 12px !important;
            color: var(--text-muted) !important;
        }
        .story-viewer-close {
            background: none !important;
            border: none !important;
            font-size: 24px !important;
            cursor: pointer !important;
            color: var(--text-muted) !important;
            padding: 4px !important;
        }
        /* Progress bars */
        .story-progress-container {
            display: flex !important;
            gap: 4px !important;
            padding: 8px 18px 0 !important;
        }
        .story-progress-bar-container {
            flex: 1 !important;
            height: 4px !important;
            background: var(--border-medium) !important;
            border-radius: 4px !important;
            overflow: hidden !important;
        }
        .story-progress-bar {
            height: 100% !important;
            width: 0% !important;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)) !important;
            border-radius: 4px !important;
            transition: width 0.05s linear !important;
        }
        /* Media area – 9:16 contain */
        .story-viewer-content {
            aspect-ratio: 9 / 16 !important;
            background: #000 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            position: relative !important;
        }
        .story-viewer-content img,
        .story-viewer-content video {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }
        .story-caption {
            padding: 8px 18px !important;
            font-size: 14px !important;
            color: var(--text-secondary) !important;
            background: var(--bg-surface) !important;
        }
        /* Footer with reply & actions */
        .story-viewer-footer {
            padding: 12px 18px 18px !important;
            background: var(--bg-surface) !important;
            border-top: 1px solid var(--border-light) !important;
        }
        .story-reply-input {
            display: flex !important;
            gap: 8px !important;
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-medium) !important;
            border-radius: 40px !important;
            padding: 4px 4px 4px 16px !important;
            margin-bottom: 12px !important;
        }
        .story-reply-input input {
            flex: 1 !important;
            background: transparent !important;
            border: none !important;
            color: var(--text-primary) !important;
            font-size: 14px !important;
            outline: none !important;
        }
        .story-reply-input button {
            background: var(--accent-blue) !important;
            border: none !important;
            width: 36px !important;
            height: 36px !important;
            border-radius: 50% !important;
            color: white !important;
            font-size: 16px !important;
            cursor: pointer !important;
        }
        .story-actions {
            display: flex !important;
            justify-content: flex-end !important;
            gap: 16px !important;
        }
        .story-actions button {
            background: none !important;
            border: none !important;
            color: var(--text-primary) !important;
            font-size: 22px !important;
            cursor: pointer !important;
            padding: 4px !important;
        }
        /* Navigation areas (tap left/right) */
        .story-nav {
            display: flex !important;
            position: absolute !important;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none !important;
        }
        .story-nav-left, .story-nav-right {
            flex: 1 !important;
            pointer-events: auto !important;
        }

        /* Message bubbles: normal whitespace */
        .message-bubble {
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            white-space: normal !important;
        }
        .message-text {
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            white-space: normal !important;
        }
        .message-input {
            white-space: pre-wrap !important;
            overflow-y: auto !important;
            line-height: 1.4 !important;
        }

        /* General glass & polish */
        .app-container { background: var(--bg-primary) !important; }
        .chat-sidebar {
            background: var(--sidebar-bg) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-right: 1px solid var(--border-light) !important;
            box-shadow: var(--shadow-sm) !important;
        }

        /* Mobile adaptation */
        @media (max-width: 768px) {
            .chat-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
                width: 85%;
                max-width: 340px;
            }
            .chat-sidebar.mobile-visible { transform: translateX(0); }
        }
    </style>

    <!-- Mobile redirect (original) -->
    <script>
        if (window.innerWidth <= 768) {
            window.location.replace("{{ url_for('chats.mobile') }}");
        }
    </script>
</head>
<body>
    <!-- Menu Button -->
    <button class="menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>

    <!-- Popout Menu (unchanged) -->
    <aside class="popout-menu-column" id="popoutMenu">...</aside>

    <!-- Panel Overlay -->
    <div class="panel-overlay" id="panelOverlay" onclick="closeAllPanels()"></div>

    <!-- Settings Panel (unchanged) -->
    <div class="settings-panel" id="settingsPanel">...</div>

    <!-- Privacy Panel (unchanged) -->
    <div class="privacy-panel" id="privacyPanel">...</div>

    <!-- Profile Modal (unchanged) -->
    <div id="profileModal" class="modal-overlay" style="display:none">...</div>

    <!-- Edit Profile Modal (unchanged) -->
    <div id="editProfileModal" class="modal-overlay" style="display:none">...</div>

    <!-- Main App Container -->
    <div class="app-container">
        <div class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <h1><a href="{{ url_for('chats.kis_info') }}" style="text-decoration:none">Kiselgram</a></h1>
                <span class="premium-badge" style="display:inline-block;margin-top:4px">PREMIUM</span>
            </div>
            <div class="global-search-container">
                <div class="global-search">
                    <span class="global-search-icon">🔍</span>
                    <input type="text" class="global-search-input" id="globalSearchInput" placeholder="Search..." autocomplete="off">
                    <div class="search-results" id="searchResults"></div>
                </div>
            </div>
            <div class="stories-row" id="storiesRow"></div>
            <div class="chat-list" id="chatList"><div class="loading-spinner"></div></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-chat" id="emptyChat">
                <div class="empty-chat-icon">✨</div>
                <h3>Welcome to Premium</h3>
                <p>Select a chat</p>
                <div class="mobile-chat-list-container mobile-only">
                    <div class="chat-list mobile-chat-list" id="mobileChatList"></div>
                </div>
            </div>

            <div id="chatView" class="panel-view" style="display:none">
                <div class="chat-header">
                    <div class="chat-header-left">
                        <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                        <div class="chat-header-info"><div class="chat-header-name" id="chatHeaderName"></div><div class="chat-header-status" id="chatHeaderStatus"></div></div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="header-action-btn" onclick="openChatCustomization()">🎨</button>
                        <button class="header-action-btn" onclick="showChatInfo()">ℹ️</button>
                        <button class="header-action-btn" onclick="showChatMenu()">⋮</button>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer"><div class="loading-spinner"></div></div>
                <div class="chat-input-area">
                    <div id="replyPreview" class="reply-preview" style="display:none"><div class="reply-preview-content"><div class="reply-preview-name"></div><div class="reply-preview-text"></div></div><button class="cancel-reply-btn" onclick="cancelReply()">✕</button></div>
                    <div class="input-wrapper">
                        <button class="attachment-btn" onclick="triggerFileUpload()">📎</button>
                        <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" disabled>➤</button>
                    </div>
                </div>
            </div>

            <!-- Contacts / Create Group / Create Channel (unchanged) -->
            <div id="contactsView" class="panel-view" style="display:none">...</div>
            <div id="createGroupView" class="panel-view" style="display:none">...</div>
            <div id="createChannelView" class="panel-view" style="display:none">...</div>
        </div>
    </div>

    <!-- Mobile bottom nav & menu button -->
    <nav class="mobile-bottom-nav mobile-only">...</nav>
    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>

    <!-- Upload area & file input -->
    <div class="upload-area" id="uploadArea">...</div>
    <div id="modalRoot"></div>
    <input type="file" id="fileInput" style="display:none" multiple onchange="handleFileSelect(this)">

    <!-- Original premium JavaScript -->
    <script src="{{ url_for('static', filename='js/prem.js') }}"></script>

    <!-- PATCH: Transform story viewer into modal + fix create story -->
    <script>
        (function() {
            'use strict';

            // Override renderStoryViewer to build the iPhone‑style modal instead of fullscreen
            const originalRender = window.renderStoryViewer;
            window.renderStoryViewer = function() {
                const storyUser = window.currentStoryUser;
                const story = storyUser?.stories?.[window.currentStoryIndex];
                if (!story) return;

                // Remove any existing viewer
                document.getElementById('storyViewer')?.remove();

                const viewer = document.createElement('div');
                viewer.className = 'story-viewer';
                viewer.id = 'storyViewer';
                viewer.innerHTML = `
                    <div class="story-viewer-modal">
                        <div class="story-progress-container">
                            ${storyUser.stories.map((_, i) => `
                                <div class="story-progress-bar-container">
                                    <div class="story-progress-bar ${i < window.currentStoryIndex ? 'completed' : ''}" id="storyProgress${i}"></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="story-viewer-header">
                            <div class="story-viewer-user">
                                <div class="story-viewer-avatar">${storyUser.avatar_letter || storyUser.display_name?.[0]}</div>
                                <div class="story-viewer-info">
                                    <span class="story-viewer-name">${escapeHtml(storyUser.display_name)}</span>
                                    <span class="story-viewer-time">${formatTime(story.created_at)}</span>
                                </div>
                            </div>
                            <button class="story-viewer-close" onclick="closeStoryViewer()">✕</button>
                        </div>
                        <div class="story-viewer-content">
                            ${story.media_type === 'video'
                                ? `<video src="${story.media_url}" autoplay loop muted></video>`
                                : `<img src="${story.media_url}" alt="">`}
                            <div class="story-nav">
                                <div class="story-nav-left" onclick="previousStory()"></div>
                                <div class="story-nav-right" onclick="nextStory()"></div>
                            </div>
                        </div>
                        ${story.caption ? `<div class="story-caption">${escapeHtml(story.caption)}</div>` : ''}
                        <div class="story-viewer-footer">
                            <div class="story-reply-input">
                                <input type="text" id="storyReplyInput" placeholder="Reply...">
                                <button onclick="sendStoryReply()">➤</button>
                            </div>
                            <div class="story-actions">
                                <button onclick="likeCurrentStory()" id="storyLikeBtn">${story.liked ? '❤️' : '🤍'} <span>${story.like_count || 0}</span></button>
                                ${story.user_id === window.currentUserId ? `<button onclick="deleteCurrentStory()">🗑️</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(viewer);
                document.body.style.overflow = 'hidden';
                startProgress();

                // Mark as viewed
                fetch(`/api/stories/${story.id}/view`, { method: 'POST' });
            };

            // Helper functions (ensure they exist)
            function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
            function formatTime(ts) {
                if (!ts) return '';
                const d = new Date(ts), n = new Date(), diff = n - d;
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return Math.floor(diff/60000)+'m ago';
                if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
                return d.toLocaleDateString();
            }

            // Patch create story modal to fix upload placeholder alignment
            const originalShowCreate = window.showCreateStoryModal;
            if (typeof originalShowCreate === 'function') {
                window.showCreateStoryModal = function() {
                    originalShowCreate();
                    setTimeout(() => {
                        const modal = document.querySelector('.modal-overlay');
                        if (modal) modal.classList.add('story-create-modal');
                        const preview = document.getElementById('storyMediaPreview');
                        if (preview) {
                            const media = preview.querySelector('img, video');
                            if (media) {
                                media.style.objectFit = 'contain';
                                media.style.width = '100%';
                                media.style.height = '100%';
                            }
                        }
                        // Fix click on upload area
                        const uploadDiv = document.querySelector('.story-media-upload');
                        if (uploadDiv) {
                            uploadDiv.onclick = () => document.getElementById('storyMediaInput')?.click();
                        }
                    }, 20);
                };
            }

            // Ensure preview uses contain
            const originalPreview = window.previewStoryMedia;
            if (typeof originalPreview === 'function') {
                window.previewStoryMedia = function(input) {
                    originalPreview(input);
                    const preview = document.getElementById('storyMediaPreview');
                    if (preview) {
                        const media = preview.querySelector('img, video');
                        if (media) {
                            media.style.objectFit = 'contain';
                            media.style.width = '100%';
                            media.style.height = '100%';
                        }
                    }
                };
            }

            // Patch close viewer to remove modal and restore body scroll
            const originalClose = window.closeStoryViewer;
            window.closeStoryViewer = function() {
                if (window.storyProgressInterval) clearInterval(window.storyProgressInterval);
                document.getElementById('storyViewer')?.remove();
                document.body.style.overflow = '';
                if (typeof window.loadStories === 'function') window.loadStories();
            };

            // Ensure progress works
            window.startProgress = function() {
                if (window.storyProgressInterval) clearInterval(window.storyProgressInterval);
                const bar = document.getElementById(`storyProgress${window.currentStoryIndex}`);
                if (!bar) return;
                let w = 0;
                window.storyProgressInterval = setInterval(() => {
                    w += 1;
                    bar.style.width = w + '%';
                    if (w >= 100) {
                        clearInterval(window.storyProgressInterval);
                        window.nextStory();
                    }
                }, 50);
            };

            // Theme init
            const theme = localStorage.getItem('kiselgram_theme');
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

            window.toggleMobileSidebar = function() {
                document.getElementById('chatSidebar').classList.toggle('mobile-visible');
            };
        })();
    </script>
</body>
</html>
