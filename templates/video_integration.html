{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-size: 2.5rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎥 Kiselgram Video Chat</h1>
        <a href="{{ url_for('chats.chat_list') }}" style="text-decoration: none; color: #667eea;">← Back to Chats</a>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px;">
        <!-- Create Room Card -->
        <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 2rem;">🎬</span> Create New Room
            </h2>
            <p style="color: #666; margin-bottom: 25px;">Start a new video call and invite others</p>
            <button onclick="createRoom()" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 15px 30px; border-radius: 40px; font-size: 1.1rem; cursor: pointer; width: 100%; transition: transform 0.2s;">
                ➕ Create Video Room
            </button>
        </div>

        <!-- Join Room Card -->
        <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 2rem;">🔗</span> Join Existing Room
            </h2>
            <p style="color: #666; margin-bottom: 15px;">Enter a room ID to join</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="roomIdInput" placeholder="Enter room ID" style="flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 30px; font-size: 1rem;">
                <button onclick="joinRoom()" style="background: #48bb78; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 1rem; cursor: pointer;">
                    Join
                </button>
            </div>
        </div>
    </div>

    <!-- Active Rooms List -->
    <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
        <h2 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.5rem;">🟢</span> Active Rooms
        </h2>
        <div id="roomsList" style="min-height: 100px;">
            <p style="color: #999; text-align: center;">Loading rooms...</p>
        </div>
    </div>
</div>

<style>
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .room-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        margin-bottom: 10px;
        transition: all 0.2s;
    }
    .room-item:hover {
        background: #f7fafc;
        border-color: #667eea;
    }
</style>

<script>
    async function createRoom() {
        try {
            const response = await fetch('/video/create-room');
            const data = await response.json();

            if (data.success) {
                window.location.href = `/video/join/${data.room_id}`;
            } else {
                alert('Error creating room: ' + data.error);
            }
        } catch (error) {
            alert('Video server not running. Please start it with ./video_server/run.sh');
        }
    }

    async function joinRoom() {
        const roomId = document.getElementById('roomIdInput').value;
        if (!roomId) {
            alert('Please enter a room ID');
            return;
        }
        window.location.href = `/video/join/${roomId}`;
    }

    async function loadRooms() {
        try {
            const response = await fetch('/video/rooms');
            const data = await response.json();

            const roomsList = document.getElementById('roomsList');

            if (data.success && data.rooms && data.rooms.length > 0) {
                roomsList.innerHTML = data.rooms.map(room => `
                    <div class="room-item">
                        <div>
                            <strong style="font-size: 1.1rem;">Room: ${room.room_id}</strong>
                            <div style="color: #666; margin-top: 5px;">
                                <span>Created by: ${room.created_by}</span>
                                <span style="margin-left: 15px;">👥 ${room.participants} participants</span>
                            </div>
                        </div>
                        <button onclick="window.location.href='/video/join/${room.room_id}'"
                                style="background: #667eea; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer;">
                            Join
                        </button>
                    </div>
                `).join('');
            } else {
                roomsList.innerHTML = '<p style="color: #999; text-align: center;">No active rooms</p>';
            }
        } catch (error) {
            document.getElementById('roomsList').innerHTML = '<p style="color: #999; text-align: center;">Video server not running</p>';
        }
    }

    // Load rooms on page load
    loadRooms();

    // Refresh every 10 seconds
    setInterval(loadRooms, 10000);
</script>
{% endblock %}
