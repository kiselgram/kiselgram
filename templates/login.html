{% extends "base.html" %}

{% block styles %}
<style>
    /* Full Page Background with Tint */
    body {
        background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                    url('{{ url_for('static', filename='kiselgram-banner.jpg') }}');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        font-family: sans-serif;
    }

    /* Login Card & Circular Logo */
    .login-container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .logo-img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #0088cc;
        margin-bottom: 15px;
    }

    /* Inputs & Buttons */
    .mobile-input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 2px solid #ddd;
        border-radius: 12px;
        box-sizing: border-box;
    }

    .mobile-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: #0088cc;
        color: white;
        font-weight: 600;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <img src="{{ url_for('static', filename='favicon.ico') }}" class="logo-img" alt="Logo">
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required class="mobile-input">
        <input type="password" name="password" placeholder="Password" required class="mobile-input">
        <button type="submit" class="mobile-btn">Login / Register</button>
    </form>
</div>
{% endblock %}
