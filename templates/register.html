{% extends "base.html" %}

{% block title %}Sign Up - Kiselgram{% endblock %}

{% block styles %}
<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background-image: url('{{ url_for("static", filename="kiselgram-banner.jpg") }}');
        background-size: cover;
    }

    .auth-card {
        background: var(--tg-header);
        border-radius: 28px;
        padding: 40px 32px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        animation: fadeIn 0.4s ease-out;
    }

    .logo {
        text-align: center;
        margin-bottom: 32px;
    }

    .logo-icon {
        width: 80px;
        height: 80px;
        background-image: url("{{ url_for('static', filename='favicon.ico') }}");
        border-radius: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin-bottom: 16px;
        background-size: cover;
        background-position: center;
    }

    .logo h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--tg-primary), #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .logo p {
        color: var(--tg-text-light);
        font-size: 14px;
        margin-top: 8px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-input {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid var(--tg-border);
        border-radius: 16px;
        font-size: 16px;
        background: var(--tg-bg);
        color: var(--tg-text);
        transition: all 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--tg-primary);
        box-shadow: 0 0 0 3px rgba(94, 114, 228, 0.1);
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--tg-primary), #764ba2);
        color: white;
        border: none;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 12px;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(94, 114, 228, 0.3);
    }

    .submit-btn:active {
        transform: translateY(0);
    }

    .google-login-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 14px;
        margin-top: 16px;
        background: white;
        border: 2px solid var(--tg-border);
        border-radius: 16px;
        color: var(--tg-text);
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
    }

    .google-login-btn:hover {
        background: #f8f9fa;
        border-color: var(--tg-primary);
    }

    .login-link {
        text-align: center;
        margin-top: 24px;
        color: var(--tg-text-light);
        font-size: 14px;
    }

    .login-link a {
        color: var(--tg-primary);
        text-decoration: none;
        font-weight: 600;
    }

    .password-hint {
        font-size: 12px;
        color: var(--tg-text-light);
        margin-top: 4px;
    }

    @media (max-width: 480px) {
        .auth-card {
            padding: 32px 24px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            font-size: 32px;
        }
        .logo h1 {
            font-size: 24px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="logo">
            <div class="logo-icon"></div>
            <h1>Kiselgram</h1>
            <p>Create your account</p>
        </div>

        {% if error %}
        <div class="error-message" style="background: rgba(245,54,92,0.1); color: #f5365c; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" id="registerForm">
            <div class="form-group">
                <input type="text"
                       name="username"
                       class="form-input"
                       placeholder="Username"
                       value="{{ username or '' }}"
                       required
                       autofocus>
            </div>
            <div class="form-group">
                <input type="email"
                       name="email"
                       class="form-input"
                       placeholder="Email address"
                       value="{{ email or '' }}"
                       required>
            </div>
            <div class="form-group">
                <input type="password"
                       name="password"
                       class="form-input"
                       placeholder="Password"
                       required
                       minlength="6">
                <div class="password-hint">At least 6 characters</div>
            </div>
            <div class="form-group">
                <input type="password"
                       name="confirm_password"
                       class="form-input"
                       placeholder="Confirm password"
                       required>
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <a href="{{ url_for('auth.google_login') }}" class="google-login-btn">
            <img src="{{ url_for('static', filename='img/google-signin-button.png') }}" alt="Google Logo" width="100">
            Sign up with Google
        </a>

        <div class="login-link">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = this.querySelector('input[name="password"]').value;
        const confirm = this.querySelector('input[name="confirm_password"]').value;

        if (password !== confirm) {
            e.preventDefault();
            alert('Passwords do not match');
            return;
        }

        if (password.length < 6) {
            e.preventDefault();
            alert('Password must be at least 6 characters');
            return;
        }

        const btn = this.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = 'Creating account...';
    });
</script>
{% endblock %}
