<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Kiselgram</title>
    <style>
        :root {
            --bg-primary: #e9f0f5;
            --bg-secondary: #ffffff;
            --bg-surface: #f8fbfe;
            --sidebar-bg: #ffffff;
            --border-color: #e6edf4;
            --text-primary: #1e2f3e;
            --text-secondary: #5c6f87;
            --text-muted: #8a9bb0;
            --accent-green: #2dce89;
            --accent-blue: #5e72e4;
            --accent-green-dark: #24a46d;
            --accent-blue-dark: #4a5bd4;
            --accent-red: #f5365c;
            --accent-orange: #fb6340;
            --hover-bg: #f0f4f9;
            --active-bg: #eef2ff;
            --online-green: #2dce89;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
            --font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.4s ease-out;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-green));
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 16px;
            color: white;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .error-message {
            background: rgba(245, 54, 92, 0.1);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            font-size: 16px;
            background: var(--bg-surface);
            color: var(--text-primary);
            transition: all 0.2s;
            font-family: var(--font-family);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(251, 99, 64, 0.1);
        }

        .password-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-green));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            font-family: var(--font-family);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 99, 64, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .google-btn:hover {
            background: var(--hover-bg);
            border-color: var(--accent-orange);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .login-link a {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }
            .logo-icon {
                width: 64px;
                height: 64px;
                font-size: 32px;
            }
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <div class="logo-icon">K</div>
            <h1>Kiselgram</h1>
            <p>Create your account</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" id="registerForm">
            <div class="form-group">
                <input type="text"
                       name="username"
                       class="form-input"
                       placeholder="Username"
                       value="{{ username or '' }}"
                       required
                       autofocus>
            </div>
            <div class="form-group">
                <input type="email"
                       name="email"
                       class="form-input"
                       placeholder="Email address"
                       value="{{ email or '' }}"
                       required>
            </div>
            <div class="form-group">
                <input type="password"
                       name="password"
                       class="form-input"
                       placeholder="Password"
                       required
                       minlength="6">
                <div class="password-hint">At least 6 characters</div>
            </div>
            <div class="form-group">
                <input type="password"
                       name="confirm_password"
                       class="form-input"
                       placeholder="Confirm password"
                       required>
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <a href="{{ url_for('auth.google_login') }}" class="google-btn">
            <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            Sign up with Google
        </a>

        <div class="login-link">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = this.querySelector('input[name="password"]').value;
            const confirm = this.querySelector('input[name="confirm_password"]').value;

            if (password !== confirm) {
                e.preventDefault();
                alert('Passwords do not match');
                return;
            }

            if (password.length < 6) {
                e.preventDefault();
                alert('Password must be at least 6 characters');
                return;
            }

            const btn = this.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
        });
    </script>
</body>
</html>
