<!-- Story Upload Modal – NO CAPTION INPUT, only file select & privacy -->
<div class="modal" id="storyUploadModal">
    <div class="modal-content" style="max-width: 420px;">
        <div class="modal-header">
            <h3><i class="fas fa-plus-circle"></i> New Story</h3>
            <button class="modal-close" onclick="closeModal('storyUploadModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" style="text-align: center;">
            <!-- Clickable upload area -->
            <div class="story-upload-area" onclick="document.getElementById('storyFileInput').click()">
                <div class="upload-placeholder" id="storyMediaPreview">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: var(--primary-color);"></i>
                    <p>Click to upload image or video</p>
                    <small style="color: var(--text-muted);">JPG, PNG, GIF, MP4, MOV</small>
                </div>
                <input type="file" id="storyFileInput" accept="image/*,video/*" style="display: none;"
                       onchange="previewStoryMedia(this)">
            </div>
            <!-- Privacy selector -->
            <div class="form-group" style="margin-top: 16px;">
                <label style="display: block; text-align: left; font-weight: 600; margin-bottom: 6px;">Who can see</label>
                <select id="storyPrivacy" class="modal-input" style="width: 100%;">
                    <option value="everyone">Everyone</option>
                    <option value="contacts">Contacts only</option>
                    <option value="nobody">Only me</option>
                </select>
            </div>
            <button class="modal-btn modal-btn-primary"
                    onclick="uploadStory()"
                    style="width: 100%; margin-top: 16px; background: var(--primary-gradient);">
                <i class="fas fa-paper-plane"></i> Post Story
            </button>
        </div>
    </div>
</div>
