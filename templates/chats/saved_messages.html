<!-- Saved Messages (chat with self) – initiates a special chat -->
<div class="chat-item pinned" onclick="openSavedMessages()" style="border-radius: 12px; margin-bottom: 4px;">
    <div class="chat-avatar" style="background: linear-gradient(135deg, #667eea, #764ba2);">
        <i class="fas fa-bookmark"></i>
    </div>
    <div class="chat-info">
        <div class="chat-name-row">
            <span class="chat-name">Saved Messages</span>
        </div>
        <div class="chat-preview">
            <span class="chat-message">Tap to open</span>
        </div>
    </div>
</div>
