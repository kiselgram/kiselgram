<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 · Forbidden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f8fafc 0%, #eef2f6 100%);
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-container { max-width: 560px; width: 100%; }
        .error-card {
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            text-align: center;
        }
        .error-icon { font-size: 4rem; margin-bottom: 1rem; color: #b91c1c; }
        .error-code { font-size: 5rem; font-weight: 800; background: linear-gradient(135deg, #1e293b, #2d3a4e); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .error-title { font-size: 1.8rem; font-weight: 600; color: #0f172a; margin: 0.5rem 0; }
        .error-message { background: #f1f5f9; display: inline-block; padding: 0.3rem 1rem; border-radius: 40px; font-weight: 500; margin-bottom: 1.5rem; }
        .description { color: #334155; margin-bottom: 2rem; line-height: 1.5; }
        .action-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn-sm { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.4rem; border-radius: 60px; background: white; border: 1px solid #cbd5e1; color: #1e293b; text-decoration: 
none; font-weight: 500; transition: 0.2s; }
        .btn-sm:hover { background: #f8fafc; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-card">
        <div class="error-icon"><i class="fas fa-hand-paper"></i></div>
        <div class="error-code">403</div>
        <div class="error-title">Forbidden</div>
        <div class="error-message">Access denied.</div>
        <div class="description">You don't have permission to access this resource. Contact administrator if you believe this is a mistake.</div>
        <div class="action-buttons">
            <a href="/" class="btn-sm"><i class="fas fa-home"></i> Home</a>
            <a href="mailto:grown.dk.up@gmail.com" class="btn-sm"><i class="fas fa-envelope"></i> Support</a>
        </div>
    </div>
</div>
</body>
</html>
