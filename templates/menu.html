{% set active_page = request.endpoint %}

<style>
    /* Sidebar Menu Styles */
    .sidebar-toggle {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 44px;
        height: 44px;
        background: var(--tg-primary);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        z-index: 1001;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .sidebar-toggle:hover {
        transform: scale(1.05);
        background: var(--tg-primary-hover);
    }

    .sidebar-toggle span {
        display: block;
        width: 20px;
        height: 2px;
        background: white;
        margin: 4px 0;
        transition: all 0.3s ease;
        border-radius: 2px;
    }

    /* Animated hamburger to X */
    .sidebar-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
    }

    .sidebar-toggle.active span:nth-child(2) {
        opacity: 0;
    }

    .sidebar-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translate(7px, -6px);
    }

    /* Sidebar Overlay */
    .sidebar-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
    }

    .sidebar-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        width: 280px;
        height: 100%;
        background: var(--tg-header);
        backdrop-filter: blur(20px);
        z-index: 1002;
        transition: left 0.3s ease;
        box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }

    .sidebar.active {
        left: 0;
    }

    /* Sidebar Header */
    .sidebar-header {
        padding: 24px 20px;
        border-bottom: 1px solid var(--tg-border);
        background: linear-gradient(135deg, var(--tg-primary), #764ba2);
    }

    .user-avatar-large {
        width: 60px;
        height: 60px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 600;
        color: white;
        margin-bottom: 12px;
    }

    .user-name-sidebar {
        font-size: 18px;
        font-weight: 600;
        color: white;
        margin-bottom: 4px;
    }

    .user-status-sidebar {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
    }

    /* Sidebar Navigation */
    .sidebar-nav {
        flex: 1;
        padding: 20px 0;
    }

    .nav-item-sidebar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        color: var(--tg-text);
        text-decoration: none;
        transition: all 0.2s;
        position: relative;
    }

    .nav-item-sidebar:hover {
        background: var(--tg-surface);
    }

    .nav-item-sidebar.active {
        background: rgba(94, 114, 228, 0.1);
        color: var(--tg-primary);
        border-left: 3px solid var(--tg-primary);
    }

    .nav-icon-sidebar {
        font-size: 22px;
        width: 32px;
        text-align: center;
    }

    .nav-label-sidebar {
        font-size: 15px;
        font-weight: 500;
    }

    .nav-badge {
        margin-left: auto;
        background: var(--tg-danger);
        color: white;
        border-radius: 20px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
    }

    /* Sidebar Footer */
    .sidebar-footer {
        padding: 20px;
        border-top: 1px solid var(--tg-border);
    }

    .logout-btn-sidebar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: rgba(245, 54, 92, 0.1);
        border: none;
        border-radius: 12px;
        color: var(--tg-danger);
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s;
    }

    .logout-btn-sidebar:hover {
        background: rgba(245, 54, 92, 0.2);
    }

    /* Main content shift when sidebar is open on desktop */
    @media (min-width: 768px) {
        body.sidebar-open {
            overflow: hidden;
        }
    }

    /* Hide sidebar toggle on mobile? No, keep it */
    @media (max-width: 480px) {
        .sidebar-toggle {
            top: 12px;
            left: 12px;
            width: 40px;
            height: 40px;
        }

        .sidebar-toggle span {
            width: 18px;
            margin: 3px 0;
        }

        .sidebar {
            width: 260px;
        }
    }

    /* Animation for sidebar items */
    .nav-item-sidebar {
        animation: slideIn 0.3s ease-out;
        animation-fill-mode: both;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    /* Staggered animations */
    .nav-item-sidebar:nth-child(1) { animation-delay: 0.05s; }
    .nav-item-sidebar:nth-child(2) { animation-delay: 0.1s; }
    .nav-item-sidebar:nth-child(3) { animation-delay: 0.15s; }
    .nav-item-sidebar:nth-child(4) { animation-delay: 0.2s; }
    .nav-item-sidebar:nth-child(5) { animation-delay: 0.25s; }

    /* Dark mode adjustments */
    @media (prefers-color-scheme: dark) {
        .sidebar {
            background: rgba(26, 26, 26, 0.98);
            backdrop-filter: blur(20px);
        }
    }
</style>

<!-- Sidebar Toggle Button -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
</button>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar Menu -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="user-avatar-large">
            {{ current_user.username[0]|upper if current_user else 'U' }}
        </div>
        <div class="user-name-sidebar">{{ current_user.username if current_user else 'Guest' }}</div>
        <div class="user-status-sidebar">Online</div>
    </div>

    <div class="sidebar-nav">
        <a href="{{ url_for('chats.chat_list') }}" class="nav-item-sidebar {% if active_page == 'chats.chat_list' %}active{% endif %}">
            <div class="nav-icon-sidebar">💬</div>
            <div class="nav-label-sidebar">Chats</div>
        </a>

        <a href="{{ url_for('video.video_index') }}" class="nav-item-sidebar {% if active_page == 'video.video_index' %}active{% endif %}">
            <div class="nav-icon-sidebar">🎥</div>
            <div class="nav-label-sidebar">Video Calls</div>
        </a>

        <a href="{{ url_for('search.search') }}" class="nav-item-sidebar {% if active_page == 'search.search' %}active{% endif %}">
            <div class="nav-icon-sidebar">🔍</div>
            <div class="nav-label-sidebar">Search</div>
        </a>

        <a href="{{ url_for('chats.users_list') }}" class="nav-item-sidebar {% if active_page == 'chats.users_list' %}active{% endif %}">
            <div class="nav-icon-sidebar">👥</div>
            <div class="nav-label-sidebar">Contacts</div>
        </a>

        <a href="{{ url_for('auth.settings') }}" class="nav-item-sidebar {% if active_page == 'auth.settings' %}active{% endif %}">
            <div class="nav-icon-sidebar">⚙️</div>
            <div class="nav-label-sidebar">Settings</div>
        </a>
    </div>

    <div class="sidebar-footer">
        <button class="logout-btn-sidebar" id="logoutBtnSidebar">
            <span>🚪</span>
            <span>Sign Out</span>
        </button>
    </div>
</div>

<script>
    // Sidebar functionality
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggleBtn = document.getElementById('sidebarToggle');

    function openSidebar() {
        sidebar.classList.add('active');
        overlay.classList.add('active');
        toggleBtn.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
        toggleBtn.classList.remove('active');
        document.body.style.overflow = '';
    }

    function toggleSidebar() {
        if (sidebar.classList.contains('active')) {
            closeSidebar();
        } else {
            openSidebar();
        }
    }

    // Event listeners
    toggleBtn.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Close sidebar on escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && sidebar.classList.contains('active')) {
            closeSidebar();
        }
    });

    // Close sidebar when clicking a nav item (mobile)
    const navItems = document.querySelectorAll('.nav-item-sidebar');
    navItems.forEach(item => {
        item.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });

    // Logout functionality
    const logoutBtn = document.getElementById('logoutBtnSidebar');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', function() {
            if (confirm('Are you sure you want to sign out?')) {
                window.location.href = '/logout';
            }
        });
    }

    // Close sidebar on window resize if open
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth > 768 && sidebar.classList.contains('active')) {
                // Keep open on desktop if user wants, or close it?
                // We'll keep it open, but you can change behavior
            }
        }, 250);
    });

    // Prevent body scroll when sidebar is open
    document.addEventListener('touchmove', function(e) {
        if (sidebar.classList.contains('active') && !sidebar.contains(e.target)) {
            e.preventDefault();
        }
    }, { passive: false });
</script>
